@if (tracksLoading()) {
  <mat-spinner class="m-3" />
} @else {
  @if (tracksError()) {
    <div class="rounded-md bg-red-700 text-white">
      {{ tracksError() }}
    </div>
  }

  <table [dataSource]="dataSource" [trackBy]="trackByFn" mat-table>
    <ng-container matColumnDef="trackNumber">
      <th *matHeaderCellDef class="text-primary!" mat-header-cell>#</th>
      <td *matCellDef="let element" class="p-0! py-1! pl-1!" mat-cell>
        <mat-form-field class="w-full" floatLabel="auto">
          <input [formField]="element.trackNumber" matInput placeholder="No." />
        </mat-form-field>
      </td>
    </ng-container>

    <ng-container matColumnDef="title">
      <th *matHeaderCellDef class="text-primary!" mat-header-cell>Track</th>
      <td *matCellDef="let element" class="p-0! pl-2!" mat-cell>
        <mat-form-field class="w-full" [matTooltip]="element().value().fullPath" floatLabel="auto" matTooltipPosition="above">
          <input [formField]="element.title" matInput placeholder="Title" appTitleCase />
        </mat-form-field>
      </td>
    </ng-container>

    <ng-container matColumnDef="duration">
      <th *matHeaderCellDef class="text-primary!" mat-header-cell>Duration</th>
      <td *matCellDef="let element" mat-cell>
        {{ element().value().duration | time }}
      </td>
    </ng-container>

    <ng-container matColumnDef="bitrate">
      <th *matHeaderCellDef class="text-primary!" mat-header-cell>Bitrate</th>
      <td *matCellDef="let element" mat-cell>
        {{ element().value().bitrate | bitrate }}
      </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th *matHeaderCellDef class="text-primary!" mat-header-cell>Actions</th>
      <td *matCellDef="let element; let i = index" mat-cell>
        <button aria-label="Example icon-button with a menu" type="button" [matMenuTriggerFor]="menu" mat-icon-button>
          <mat-icon>more_vert</mat-icon>
        </button>
        <mat-menu #menu="matMenu">
          <button type="button" (click)="transferTrack.emit(element().value().id)" mat-menu-item>
            <mat-icon>adb</mat-icon>
            <span>Transfer</span>
          </button>
          <button type="button" (click)="viewLyrics(i, element().value().lyrics, element().value().syncedLyrics)" mat-menu-item>
            <mat-icon>article</mat-icon>
            <span>Lyrics</span>
          </button>
          <button type="button" (click)="onPlayTrack(element().value().id)" mat-menu-item>
            <mat-icon>play_arrow</mat-icon>
            <span>Play</span>
          </button>
          <button type="button" (click)="onAddTrackToPlaylist(element().value().id)" mat-menu-item>
            <mat-icon>playlist_add</mat-icon>
            <span>Add To Playlist</span>
          </button>
          <button type="button" [itemName]="element().value().title" (click)="$event.stopPropagation()" (confirmResult)="onDelete($event, element().value().id)" mat-menu-item appConfirmDelete>
            <mat-icon>delete</mat-icon>
            <span>Delete</span>
          </button>
        </mat-menu>
      </td>
    </ng-container>

    @if (displayedColumns(); as displayedColumns) {
      <tr *matHeaderRowDef="displayedColumns" mat-header-row></tr>
      <tr *matRowDef="let row; columns: displayedColumns" mat-row></tr>
    }
  </table>
}
