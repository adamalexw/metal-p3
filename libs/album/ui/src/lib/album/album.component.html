@if (album(); as album) {
  @if (cover() ?? album.cover; as bgCover) {
    <!-- Full screen blurred background image -->
    <div class="absolute inset-0 z-[-2] bg-cover bg-center bg-no-repeat bg-fixed opacity-50 blur-xl" [style.background-image]="'url(' + bgCover + ')'"></div>
    <!-- Dark tint overlay to ensure text is perfectly readable -->
    <div class="absolute inset-0 z-[-1] bg-black/60 backdrop-blur-md"></div>
  }

  <nav class="sticky top-0 z-10 lg:block">
    <app-album-toolbar
      [saving]="albumSaving()"
      [findingUrl]="findingUrl()"
      [renamingFolder]="renamingFolder()"
      [trackTransferring]="trackTransferring()"
      [folder]="album.folder"
      [extraFiles]="album.extraFiles || false"
      (save)="onSave()"
      (imageSearch)="onImageSearch()"
      (findUrl)="onFindUrl()"
      (renameFolder)="onRenameFolder()"
      (openFolder)="openFolder.emit(album.fullPath)"
      (transfer)="onTransferAlbum()"
      (refresh)="refreshAlbum.emit()"
      (delete)="deleteAlbum.emit()"
    />
  </nav>

  @if (trackSavingProgress() || trackTransferringProgress() || trackRenamingProgress(); as progress) {
    <mat-progress-bar class="fixed top-0 z-50 w-full lg:block" [value]="progress" mode="determinate" />
  }

  <form>
    <section class="flex flex-col lg:flex-row">
      <app-cover
        class="w-full lg:max-w-125 lg:min-w-125"
        [loading]="coverLoading()"
        [cover]="cover() ?? album.cover"
        [coverError]="coverError() ?? undefined"
        [enableDnd]="true"
        (coverUrl)="coverUrl.emit($event)"
      />

      <app-album-form class="mt-1 mb-0 block w-full lg:mx-2" [field]="form.details" (findBandProps)="getBandProps($event)" (identifyBand)="onIdentifyBand()" (lyricsPriority)="lyricsPriority.emit()" />
    </section>

    <section>
      <app-tracks-toolbar
        [trackRenaming]="trackRenaming() || false"
        [lyricsLoading]="lyricsLoading() || false"
        [enableMaActions]="!!albumUrl"
        [albumDuration]="albumDuration() || 0"
        (renameTracks)="onRenameTracks()"
        (trackNumbers)="onTrackNumbers()"
        (maTracks)="onMaTracks()"
        (lyrics)="onLyrics()"
        (refreshTracks)="refreshTracks.emit(album.folder)"
        (playAlbum)="onPlayAlbum()"
        (addAlbumToPlaylist)="onAddAlbumToPlaylist()"
      />

      <app-tracks
        class="block overflow-auto lg:h-[calc(100vh-128px-500px)]"
        [field]="form.tracks"
        [tracksLoading]="tracksLoading() || false"
        [tracks]="tracks() || []"
        [tracksError]="tracksError()"
        (transferTrack)="onTransferTrack($event)"
        (playTrack)="playTrack.emit($event)"
        (addTrackToPlaylist)="addTrackToPlaylist.emit($event)"
        (delete)="deleteTrack.emit($event)"
      />
    </section>
  </form>
} @else {
  <button mat-icon-button routerLink="/">
    <mat-icon>clear</mat-icon>
  </button>
}
