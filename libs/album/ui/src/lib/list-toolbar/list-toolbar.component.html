<mat-toolbar>
  <mat-form-field class="grow lg:w-80 lg:grow-0" floatLabel="auto">
    <input type="search" [ngModel]="search()" (ngModelChange)="onSearchInput($event)" matInput placeholder="Search" />
    @if (search()) {
      <button type="button" type="button" [attr.aria-label]="'Clear search'" (click)="onClear()" mat-icon-button matSuffix>
        <mat-icon>clear</mat-icon>
      </button>
    }
  </mat-form-field>

  <button type="button" (click)="searchRequest.emit({ folder: search() })" mat-icon-button>
    <mat-icon title="refresh">refresh</mat-icon>
  </button>
  <button type="button" (click)="advancedSearch.emit()" mat-icon-button>
    <mat-icon title="advanced search">manage_search</mat-icon>
  </button>

  <button type="button" [matMenuTriggerFor]="menu" (click)="showPlaylists.emit()" mat-icon-button>
    <mat-icon title="playlits">queue_music</mat-icon>
  </button>
  <mat-menu #menu="matMenu" yPosition="above">
    @for (playlist of playlists(); track playlist) {
      <button type="button" (click)="loadPlaylist.emit(playlist.id)" mat-menu-item>{{ playlist.name }}</button>
    }
  </mat-menu>

  <button type="button" class="hidden! md:block!" [disabled]="creatingNew()" (click)="createNew.emit()" mat-icon-button>
    <mat-icon title="files to folders">create_new_folder</mat-icon>
  </button>
  <button type="button" class="hidden! md:block!" [matMenuTriggerFor]="menu" mat-icon-button>
    <mat-icon title="maintenance">engineering</mat-icon>
  </button>
  <button type="button" (click)="connectPhone.emit()" mat-icon-button>
    <mat-icon title="connect">adb</mat-icon>
  </button>
  <mat-menu #menu="matMenu" class="hidden! md:block!">
    <button type="button" [routerLink]="['maintenance', 'lyrics']" mat-menu-item>
      <mat-icon>article</mat-icon>
      <span>Lyrics</span>
    </button>
    <button type="button" [routerLink]="['maintenance', 'folders']" mat-menu-item>
      <mat-icon>folder()</mat-icon>
      <span>Folders</span>
    </button>
    <button type="button" [routerLink]="['maintenance', 'extraFiles']" mat-menu-item>
      <mat-icon>description</mat-icon>
      <span>Extra Files</span>
    </button>
    <button type="button" [routerLink]="['maintenance', 'matcher']" mat-menu-item>
      <mat-icon>link</mat-icon>
      <span>Album Matcher</span>
    </button>
    <button type="button" [routerLink]="['setlist-importer']" mat-menu-item>
      <mat-icon>queue_music</mat-icon>
      <span>Setlist Importer</span>
    </button>
  </mat-menu>
</mat-toolbar>

@if (searching()) {
  <mat-progress-bar mode="indeterminate" />
}
