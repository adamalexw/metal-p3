<mat-drawer-container fullscreen>
  <mat-drawer [opened]="store.advancedSearchOpen()" (closedStart)="onCloseAdvancedSearch()" mode="over">
    <app-advanced-search-shell />
  </mat-drawer>

  <mat-drawer-content>
    <app-list />
  </mat-drawer-content>

  <mat-drawer class="w-screen! lg:w-album! shadow-drawer" [opened]="sideNavOpen()" [mode]="sideNavMode()" position="end">
    <router-outlet />
  </mat-drawer>
</mat-drawer-container>
