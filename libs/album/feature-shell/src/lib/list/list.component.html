<app-list-toolbar
  [folder]="searchRequestFolder()"
  [searching]="albumsLoading()"
  [creatingNew]="creatingNew()"
  (advancedSearch)="onAdvancedSearch()"
  (searchRequest)="onSearch($event)"
  (showPlayer)="onShowPlayer()"
  (createNew)="onCreateNew()"
  (connectPhone)="onConnectPhone()"
/>

@if (searchRequest(); as request) {
  <cdk-virtual-scroll-viewport [style.overflow-x]="'hidden'" [style.overflow-y]="sideNavOpen() ? 'hidden' : 'auto'" [itemSize]="380" (scrolledIndexChange)="scrollIndexChange($event, request, false)" minBufferPx="1520" maxBufferPx="1900">
    <div class="mx-4 overflow-hidden" (albumAdded)="onFoldersDropped($event)" appAddAlbum>
      <div *cdkVirtualFor="let albums of albumsView(); trackBy: trackByVirtualFn">
        <div class="grid auto-cols-fr grid-flow-col gap-4 py-2 lg:auto-cols-min">
          @if (albums.length === 0 && !albumsLoading()) {
            <div class="w-max text-xl">no albums found</div>
          }

          @for (album of albums; track trackByAlbumFn($index, album)) {
            <app-list-item
              class="w-full lg:w-67"
              [album]="album"
              [coverLoading]="coverMap()[album.id]?.loading || false"
              [cover]="coverMap()[album.id]?.cover"
              [coverError]="coverMap()[album.id]?.error"
              (openAlbum)="onOpenAlbum($event)"
              (deleteAlbum)="onDeleteAlbum(album.id)"
              (transferAlbum)="onTransferAlbum(album.id, album.folder)"
              (playAlbum)="onPlayAlbum(album.id, album.folder)"
              (addToPlaylist)="onAddToPlaylist(album.id, album.folder)"
            />
          }
        </div>
      </div>
    </div>
  </cdk-virtual-scroll-viewport>
}

<footer class="fixed bottom-0 w-full" [class.w-minusAlbum]="sideNavOpen()">
  <app-player />
</footer>
