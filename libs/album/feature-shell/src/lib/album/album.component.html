@if (album(); as album) {
  <app-album
    [album]="album"
    [albumSaving]="albumSaving()"
    [tracks]="tracks()"
    [tracksLoading]="tracksLoading()"
    [tracksError]="tracksError() ?? undefined"
    [albumDuration]="albumDuration()"
    [trackSavingProgress]="trackSavingProgress()"
    [coverLoading]="coverLoading()"
    [coverError]="coverError() ?? undefined"
    [cover]="cover()"
    [findingUrl]="findingUrl()"
    [maUrls]="maUrls()"
    [gettingMaTracks]="gettingMaTracks()"
    [maTracks]="maTracks()"
    [trackRenaming]="trackRenaming()"
    [trackRenamingProgress]="trackRenamingProgress()"
    [trackTransferring]="trackTransferring()"
    [trackTransferringProgress]="trackTransferringProgress()"
    [renamingFolder]="renamingFolder()"
    [renamingFolderError]="renamingFolderError() ?? undefined"
    [lyricsLoading]="lyricsLoading()"
    [gettingBandProps]="gettingBandProps()"
    [bandProps]="bandProps()"
    (imageSearchFromMa)="onImageSearchFromMa($event)"
    (coverUrl)="onDownloadCover($event)"
    (save)="onSave($event.album, $event.tracks, $event.previousBandId)"
    (findUrl)="onFindUrl($event.artist, $event.album)"
    (getMaTracks)="onMaTracks($event)"
    (lyrics)="onLyrics()"
    (trackNumbers)="onTrackNumbers()"
    (renameTracks)="onRenameTracks($event)"
    (renameFolder)="onRenameFolder($event.src, $event.artist, $event.album)"
    (openFolder)="onOpenFolder($event)"
    (lyricsPriority)="onLyricsPriority()"
    (refreshAlbum)="onRefreshAlbum()"
    (refreshTracks)="onRefreshTracks($event)"
    (findBandProps)="onFindBandProps($event)"
    (transferAlbum)="onTransferAlbum($event)"
    (transferTrack)="onTransferTrack($event)"
    (playAlbum)="onPlayAlbum()"
    (addAlbumToPlaylist)="onAddAlbumToPlaylist()"
    (playTrack)="onPlayTrack($event)"
    (addTrackToPlaylist)="onAddTrackToPlaylist($event)"
    (deleteTrack)="onDeleteTrack($event)"
    (deleteAlbum)="onDeleteAlbum()"
  />
}
