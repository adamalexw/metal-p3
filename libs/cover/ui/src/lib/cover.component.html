@if (coverError()) {
  <div class="relative w-full" [enableDnd]="enableDnd()" (coverUrl)="coverUrl.emit($event)" appCoverDnd>
    <img alt="blank cover" [style.width.px]="width()" [style.height.px]="height()" [src]="blankCover" />
    <div class="absolute top-12 w-full rounded-md bg-red-700 text-center text-white">COVER ERROR</div>
  </div>
} @else if (cover(); as coverStr) {
  <div class="relative w-full overflow-hidden" [style.width.px]="width()" [style.height.px]="height()" [enableDnd]="enableDnd()" (coverUrl)="coverUrl.emit($event)" appCoverDnd>
    <img alt="album cover" class="w-full h-full object-cover" [src]="coverStr | safe: 'resourceUrl'" loading="lazy" />
    @if (loading()) {
      <div class="absolute inset-0 flex h-full w-full bg-slate-500/40 animate-pulse backdrop-blur-sm"></div>
    }
  </div>
} @else {
  <div class="relative w-full overflow-hidden" [enableDnd]="enableDnd()" (coverUrl)="coverUrl.emit($event)" appCoverDnd>
    <img alt="blank cover" [style.width.px]="width()" [style.height.px]="height()" [src]="blankCover" />
    @if (loading()) {
      <div class="absolute inset-0 flex h-full w-full bg-slate-500/40 animate-pulse backdrop-blur-sm"></div>
    }
  </div>
}
