<app-apply-lyrics
  [albumId]="albumId() || 0"
  [lyricsLoading]="lyricsLoading()"
  [lyricsExpected]="lyricsExpected()"
  [lyricsLoadingProgress]="lyricsLoadingProgress()"
  [tracksLoading]="tracksLoading()"
  [maTracks]="maTracks()"
  [maTracksLoading]="gettingMaTracks()"
  [tracks]="tracks()"
  [albumUrl]="albumUrl()"
  [coverLoading]="coverLoading()"
  [cover]="cover()"
  [folder]="albumFolder()"
  [applying]="applying()"
  [applyingProgress]="applyingProgress()"
  [applied]="applied()"
  [trackTransferring]="trackTransferring()"
  [trackTransferringProgress]="trackTransferringProgress()"
  [showClose]="showClose"
  (applyLyrics)="onApply($event.id, $event.lyrics)"

  (done)="onDone()"
/>
