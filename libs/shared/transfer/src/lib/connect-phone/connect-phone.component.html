<div class="mb-4 flex items-center gap-2" matSnackBarLabel>
  <mat-form-field>
    <mat-label>Host</mat-label>
    <input type="text" [(ngModel)]="host" matInput />
  </mat-form-field>

  <mat-form-field>
    <mat-label>Port</mat-label>
    <input type="number" [(ngModel)]="port" matInput />
  </mat-form-field>
</div>

<span matSnackBarActions>
  <button type="button" class="mr-2" (click)="connectPhone()" mat-flat-button matSnackBarAction color="primary">Connect</button>
  <button type="button" (click)="cancel()" mat-button matSnackBarAction color="accent">Cancel</button>
</span>
