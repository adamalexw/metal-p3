@if (playerStore.playerOpen()) {
  <div [class]="divClass()">
    <div class="static flex w-full" [class]="subDivClass()" [class.hidden]="!playerStore.activePlaylistItem()">
      <app-cover class="aspect-square shrink-0 max-h-[calc(100vh-120px)] lg:max-h-none" [class]="coverSize()" [cover]="playerStore.activeItemCover()" />

      <app-player-controls
        class="block w-full"
        [footerMode]="playerStore.footerMode()"
        [isFirstItemPlaying]="playerStore.isFirstItemPlaying()"
        [isLastItemPlaying]="playerStore.isLastItemPlaying()"
        [currentItem]="playerStore.activePlaylistItem()"
        [elapsedTime]="elapsedTime()"
        [toggleIcon]="toggleIcon()"
        (playItem)="onPlay()"
        (pauseItem)="onPause()"
        (seekTo)="onSeekTo($event)"
        (previous)="onPrevious()"
        (next)="onNext()"
        (volume)="onVolume($event)"
        (mute)="onVolume(0)"
        (toggleView)="onToogleView()"
      />
    </div>

    @if (!playerStore.footerMode()) {
      <app-playlist-shell [duration]="playerStore.playlistDuration()" (clearPlaylist)="onClearPlaylist()" (closePlaylist)="onClosePlaylist()" (togglePlaylist)="onTogglePlaylist()" />
      <app-playlist
        class="fixed top-0 left-0 z-50 h-screen overflow-y-auto bg-background lg:static lg:block lg:flex-1 lg:min-h-0 lg:h-auto lg:max-h-none lg:translate-y-0"
        [class.hidden]="!playerStore.showPlaylist()"
        [playlist]="playerStore.playlist()"
        [currentItem]="playerStore.activePlaylistItem()"
        (playItem)="onPlayItem($event)"
        (pauseItem)="onPause()"
        (resumeItem)="onPlay()"
        (removeItem)="onRemove($event)"
        (reorder)="onReorder($event)"
        (hide)="onTogglePlaylist()"
      />
    }
  </div>
}

<audio #audio autoplay></audio>
