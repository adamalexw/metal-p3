<app-nav-toolbar>
  <h2>Setlist Importer</h2>
</app-nav-toolbar>

@if (error(); as e) {
  <div class="m-4 rounded border border-red-300 bg-red-50 p-2 text-sm text-red-800">{{ e }}</div>
}

<div class="flex flex-col gap-4">
  <section class="border-b pb-4">
    <app-url-list-editor [urls]="urls()" [scraping]="scraping()" (urlsChange)="onUrlsChange($event)" (scrape)="onScrape()" />
  </section>

  <section class="grow">
    <app-review-table
      [tracks]="tracks()"
      [matching]="matching()"
      [creating]="creating()"
      (toggleSelection)="onToggleSelection($event)"
      (setAllSelection)="onSetAllSelection($event)"
      (createPlaylist)="onCreatePlaylist($event)"
    />
  </section>
</div>
